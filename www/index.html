<!DOCTYPE html>
<html lang="en">
<head>

<title>BuildTrack Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h1>BuildTrack Pro</h1>

<button onclick="login()">Login</button>

</div>


<div id="dashboard" style="display:none; text-align:center;">

<h2>Dashboard</h2>

<button onclick="openFlat()">🧱 Flat</button>

<br><br>

<button onclick="openReport()">📊 Report</button>

</div>


<script src="script.js"></script>

<script>

function openFlat(){

window.location.href="flat.html";

}


function openReport(){

window.location.href="report.html";

}

</script>


</body>
</html>
